services:
  postgres:
    image: postgres:16
    container_name: meu-desafio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meu_desafio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meu_desafio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
