    - name: Origin
      value: http://127.0.0.1:5500
  body:
    type: json
    data: |-
      {
        "email": "teste@example.com",
        "otp": "52445",
        "password": "NovaSenha123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
