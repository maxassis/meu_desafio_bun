info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/sign-in/email"
  headers:
    - name: Origin
      value: http://127.0.0.1:5500
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "max.assis@outlook.com",
        "password": "12345678"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
