info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/sign-in/email
  headers:
    - name: Origin
      value: http://localhost:3000
  body:
    type: json
    data: |-
      {
        "email": "teste@example.com",
        "password": "12345678"
      }
  auth:
    type: bearer
    token: ''

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
