info:
  name: login Google
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/auth/sign-in/social"
  headers:
    - name: credentials
      value: include
    - name: Origin
      value: http://localhost:3000
  body:
    type: json
    data: |-
      {
        "provider": "google",
        "callbackURL": "{{baseUrl}}",
        "disableRedirect": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
