info:
  name: session token mobile
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:3000/api/auth/get-session
  headers:
    - name: Authorization
      value: Bearer {{sessionToken}}
    - name: X-Client-Platform
      value: mobile
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
