      value: "{{baseUrl}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "providerId": "strava",
        "callbackURL": "meudesafio2://strava-connected",
        "scopes": ["read", "activity:read_all"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
