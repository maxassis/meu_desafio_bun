<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste Login Google</title>
    <style>
      :root {
        font-family: sans-serif;
      }

      body {
        margin: 2rem;
        max-width: 640px;
      }

      button {
        padding: 0.7rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #111827;
        color: #fff;
        cursor: pointer;
      }

      pre {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Teste minimo - Google + Better Auth</h1>
    <p>
      API: <code id="apiBase"></code><br />
      Callback: <code id="callbackUrl"></code>
    </p>

    <button id="loginBtn" type="button">Entrar com Google</button>
    <button id="sessionBtn" type="button">Ver sessao</button>

    <pre id="output">Pronto.</pre>

    <script>
      const API_BASE = `${window.location.protocol}//${window.location.hostname}:3000`;
      const callbackURL = window.location.origin + window.location.pathname;

      const apiBaseEl = document.getElementById("apiBase");
      const callbackEl = document.getElementById("callbackUrl");
      const outputEl = document.getElementById("output");

      apiBaseEl.textContent = API_BASE;
      callbackEl.textContent = callbackURL;

      function setOutput(data) {
        outputEl.textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      async function startGoogleLogin() {
        setOutput("Iniciando login Google...");

        try {
          const response = await fetch(`${API_BASE}/api/auth/sign-in/social`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify({
              provider: "google",
              callbackURL,
              disableRedirect: true,
            }),
          });

          const raw = await response.text();
          const data = raw ? JSON.parse(raw) : {};
          setOutput(data);

          if (!response.ok) {
            return;
          }

          if (data.url) {
            window.location.href = data.url;
          }
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setOutput(`Erro ao iniciar login Google: ${message}`);
        }
      }

      async function getSession() {
        setOutput("Buscando sessao...");

        try {
          const response = await fetch(`${API_BASE}/api/auth/get-session`, {
            method: "GET",
            credentials: "include",
          });

          const raw = await response.text();
          const data = raw ? JSON.parse(raw) : {};
          setOutput(data);
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setOutput(`Erro ao buscar sessao: ${message}`);
        }
      }

      document
        .getElementById("loginBtn")
        .addEventListener("click", () => void startGoogleLogin());

      document
        .getElementById("sessionBtn")
        .addEventListener("click", () => void getSession());

      void getSession();
    </script>
  </body>
</html>
